version: "3.3"

services:
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${DB_NAME:-campus_trade}
      MYSQL_USER: ${DB_USER:-campus}
      MYSQL_PASSWORD: ${DB_PASSWORD:-campus123}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 5s
      timeout: 5s
      retries: 30

  server:
    build: ./server
    container_name: campus-server
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-campus}
      DB_PASSWORD: ${DB_PASSWORD:-campus123}
      DB_NAME: ${DB_NAME:-campus_trade}
      UPLOAD_DIR: /app/uploads
    ports:
      - "${API_PORT:-3001}:3000"
    volumes:
      - server_data:/app/data
      - uploads_data:/app/uploads
    depends_on:
      - mysql
    # 等 MySQL 就绪再启动，减少 502
    command: sh -c "sleep 15 && node dist/main.js"

  web:
    build: ./web
    container_name: campus-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8081}:80"
    depends_on:
      - server

volumes:
  mysql_data:
  server_data:
  uploads_data:
