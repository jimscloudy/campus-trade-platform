version: "3.3"

services:
  server:
    build: ./server
    container_name: campus-server
    restart: unless-stopped
    # AI Key / JWT 等写在 .env.docker，由 env_file 注入
    # 注意：不要用 environment 里 AI_API_KEY=${AI_API_KEY:-} 覆盖成空字符串
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_TYPE: sqlite
      DB_PATH: /app/data/campus.db
      UPLOAD_DIR: /app/uploads
    ports:
      - "${API_PORT:-3001}:3000"
    volumes:
      - server_data:/app/data
      - uploads_data:/app/uploads

  web:
    build: ./web
    container_name: campus-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8081}:80"
    depends_on:
      - server

volumes:
  server_data:
  uploads_data:
